<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Vismont Official</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .profile-container { display: flex; flex-direction: column; gap: 30px; margin-top: 30px; }
        @media (min-width: 992px) {
            .profile-container { flex-direction: row; }
            .profile-sidebar { width: 30%; position: sticky; top: 90px; height: fit-content; }
            .profile-main { width: 70%; }
        }
        .profile-card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid #00f0ff; }
        .profile-card h2 { font-family: 'Montserrat', sans-serif; font-size: 22px; color: #0f172a; margin: 0 0 5px 0; }
        .profile-meta { text-align: left; border-top: 1px solid #e2e8f0; padding-top: 20px; margin-top: 20px; }
        .profile-meta-item { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: #334155; font-size: 15px; }
        .profile-meta-item i { color: #00f0ff; width: 20px; }
        .dashboard-section { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .dashboard-section h3 { font-family: 'Montserrat', sans-serif; font-size: 20px; color: #0f172a; margin: 0 0 20px 0; }
        .booking-history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #dcfce7; color: #15803d; }
    </style>
</head>
<body class="theme-booking">

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-mountain-sun"></i> VISMONT</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="booking.html">Accommodation</a></li>
            </ul>
        </div>
    </nav>

    <main class="container section">
        <div class="profile-container">
            <aside class="profile-sidebar">
                <div class="profile-card">
                    <div class="avatar-wrapper">
                        <img src="https://encrypted-tbn2.gstatic.com/images?q=tbn:ANd9GcSQQ2tuO-5LRyt7HzX0Pdm5QgLItjEG0JscQTnQ8Mh0-eT7y50IN0dmQcelHWXn" alt="User Avatar">
                    </div>
                    <h2>New Citizen</h2>
                    <span style="font-size: 14px; color: #94a3b8;">Vismont Citizen ID #84920</span>
                    <div class="profile-meta">
                        <div class="profile-meta-item"><i class="fa-solid fa-id-badge"></i> <span>Account Verified</span></div>
                    </div>
                </div>
            </aside>

            <div class="profile-main">
                <div class="dashboard-section">
                    <h3><i class="fa-solid fa-hotel"></i> Your Profile Dashboard</h3>
                    <div class="booking-history-item">
                        <div>
                            <h4 style="margin:0;">Welcome to Vismont!</h4>
                            <p style="margin:5px 0 0 0; font-size:13px; color:#64748b;">Your digital identity has been successfully generated.</p>
                        </div>
                        <span class="status-badge">Active</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
