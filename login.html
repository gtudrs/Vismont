<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access - Vismont Official</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 40px auto;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f1f5f9;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            color: #0f172a;
            border-bottom: 3px solid #00f0ff;
            margin-bottom: -2px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Open Sans', sans-serif;
            font-size: 15px;
            color: #0f172a;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #00f0ff;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 25px;
            color: #64748b;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .form-options a {
            color: #00f0ff;
            text-decoration: none;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #00f0ff;
            border: none;
            padding: 14px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,208,255,0.2);
            background: #0f172a;
        }
    </style>
</head>
<body class="theme-booking">

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-mountain-sun"></i> VISMONT</a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="istorie.html">History</a></li>
                <li><a href="atractii.html">Attractions</a></li>
                <li><a href="bilete.html">Tickets</a></li>
                <li><a href="booking.html">Accommodation</a></li>
            </ul>
            <div class="nav-extra">
                <a href="login.html" class="profile-icon"><i class="fa-solid fa-circle-user"></i></a>
                <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i></div>
            </div>
        </div>
    </nav>

    <main class="container section">
        <div class="auth-container">
            
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
                <div class="auth-tab" onclick="switchTab('register')">Sign Up</div>
            </div>

            <form id="login-form" class="auth-form active" action="profile.html" method="GET">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter password" required>
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="submit-btn">ACCESS PORTAL</button>
            </form>

            <form id="register-form" class="auth-form" action="profile.html" method="GET">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="reg-name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Create strong password" required>
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" required> I accept the Terms & Conditions</label>
                </div>
                <button type="submit" class="submit-btn">CREATE CITIZEN ID</button>
            </form>

        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Vismont City Hall. Secure Gateway Protocol.</p>
    </footer>

    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            forms.forEach(form => form.classList.remove('active'));

            if (type === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
